<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>QA Demo</title>
</head>
<body>
  <h1>Question-Answering 데모</h1>
  <form id="qa-form">
    <label>질문(Question):</label><br>
    <textarea id="question" style="width:500px; height:50px;"></textarea><br><br>

    <label>지문(Context):</label><br>
    <textarea id="context" style="width:500px; height:150px;"></textarea><br><br>

    <button type="button" onclick="sendQA()">질의하기</button>
  </form>

  <hr>
  <div id="result-area">
    <h3>답변:</h3>
    <div><strong>answer:</strong> <span id="answer"></span></div>
    <div><strong>score:</strong> <span id="score"></span></div>
    <div><strong>start:</strong> <span id="start"></span></div>
    <div><strong>end:</strong> <span id="end"></span></div>
  </div>

<script>
  async function sendQA() {
    const question = document.getElementById("question").value;
    const context = document.getElementById("context").value;

    const response = await fetch('/api', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({question, context})
    });
    const result = await response.json();

    document.getElementById("answer").textContent = result.answer || "";
    document.getElementById("score").textContent = result.score || "";
    document.getElementById("start").textContent = result.start || "";
    document.getElementById("end").textContent = result.end || "";
  }
</script>
</body>
</html>
